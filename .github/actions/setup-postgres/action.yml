name: Install Kamailio-DB Helm Chart
description: 'Install Kamailio-DB Helm Chart'
runs:
  using: 'composite'
  steps:

    - name: Install Kamailio-DB Helm Chart (PVC disabled)
      shell: bash
      run: |
        helm install kamailio-db \
        oci://ghcr.io/bundasmanu/charts/kamailio-db \
        --version 0.1.0 --set persistence.enabled=false

    - name: Wait until ready
      shell: bash
      run: kubectl rollout status statefulset kamailio-db -n default --timeout=120s

    - name: Check running pods
      shell: bash
      run: |
        kubectl get pods -A | grep kamailio-db
        kubectl describe pods -n default
        kubectl describe pod kamailio-db-0 -n default
        kubectl logs -n default kamailio-db-0 --tail=300 || true
        kubectl get sts kamailio-db -o jsonpath='{.spec.volumeClaimTemplates}'
        kubectl get pod kamailio-db-0 -o jsonpath='{.spec.volumes}'

    - name: Debug DNS and DB connectivity (cross-namespace)
      shell: bash
      run: |
        kubectl run dns-debug \
          --rm -i --restart=Never \
          --image=busybox:1.36 \
          --namespace default \
          -- sh -c '
            echo "=== DNS RESOLUTION ==="
            nslookup kamailio-db.default.svc.cluster.local || true

            echo "=== TCP CONNECTIVITY ==="
            nc -zv kamailio-db.default.svc.cluster.local 5432 || true

            echo "=== LOOP UNTIL DB READY ==="
            for i in $(seq 1 30); do
              nc -z kamailio-db.default.svc.cluster.local 5432 && echo "DB reachable" && exit 0
              echo "Waiting for DB..."
              sleep 2
            done

            echo "DB NOT REACHABLE"
            exit 1
          '

    - name: Validate DB connection from external pod
      shell: bash
      run: |
        kubectl run psql-client \
          --rm -i --restart=Never \
          --image=postgres:17 \
          --namespace default \
          --env="PGPASSWORD=fake" \
          --command -- sh -c '
            echo "=== WAIT FOR DB ==="
            for i in $(seq 1 30); do
              pg_isready -h kamailio-db.default.svc.cluster.local -U fake && break
              sleep 2
            done

            echo "=== RUN QUERY ==="
            psql -h kamailio-db.default.svc.cluster.local -U fake -d kamailio -c "SELECT 1;"
          '
