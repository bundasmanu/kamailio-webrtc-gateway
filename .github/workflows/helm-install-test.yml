---
name: Helm Chart Install Test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - 'main'
    tags:
      - '*'

jobs:
  helm-test:
    runs-on: ubuntu-latest
    env:
      K3D_CLUSTER_NAME: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.0'

      - name: Create k3d cluster
        uses: AbsaOSS/k3d-action@v2.4.0
        with:
          k3d-version: v5.8.3
          cluster-name: ${{ env.K3D_CLUSTER_NAME }}
          args: >-
            --agents 1

      # Hub image `latest` may lag this repo; Kamailio needs entrypoint substitution for
      # __KAMAILIO_LISTEN_POD_SET_FQDN__. Build from Dockerfile and import into k3d so CI matches git HEAD.
      - name: Load build environment (.env)
        run: grep -v '^#' .env | grep -v '^$' >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build webrtc-gateway image (ci tag)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: webrtc-gateway
          push: false
          load: true
          tags: bundasmanu/webrtc-gateway:ci
          platforms: linux/amd64
          build-args: |
            KAMAILIO_VERSION=${{ env.KAMAILIO_VERSION }}
            STARTER_KAM_USER=${{ env.STARTER_KAM_USER }}
            STARTER_KAM_GROUP=${{ env.STARTER_KAM_GROUP }}
            CONFIGS_FOLDER=${{ env.CONFIGS_FOLDER }}

      - name: Import image into k3d cluster
        run: k3d image import bundasmanu/webrtc-gateway:ci -c "${{ env.K3D_CLUSTER_NAME }}"

      - name: Setup PostgreSQL and load SQL
        uses: ./.github/actions/setup-postgres

      - name: Create namespace and webrtc-gateway-secrets
        run: |
          kubectl create namespace webrtc-gateway --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic webrtc-gateway-secrets \
            --namespace webrtc-gateway \
            --from-literal=db-connection="fake:fake@kamailio-db.default.svc.cluster.local.:5432/kamailio"

      - name: Create TLS Secret (self-signed via openssl)
        run: |
          set -euo pipefail
          TMP=$(mktemp -d)
          trap 'rm -rf "$TMP"' EXIT
          CN="${TLS_CI_CN:-ci.webrtc-gateway.local}"
          SAN="${TLS_CI_SAN:-$CN}"
          openssl req -x509 -newkey rsa:4096 -sha256 -days 1 -nodes \
            -keyout "$TMP/tls.key" -out "$TMP/tls.crt" \
            -subj "/CN=$CN" \
            -addext "subjectAltName=DNS:$SAN"
          kubectl create secret tls kamailio-tls \
            --cert="$TMP/tls.crt" --key="$TMP/tls.key" \
            --namespace webrtc-gateway \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Lint chart
        run: helm lint k8s/helm/webrtc-gateway

      - name: Template chart
        run: |
          set -euo pipefail
          helm template webrtc-gateway k8s/helm/webrtc-gateway \
            --namespace webrtc-gateway \
            --debug \
            > /tmp/webrtc-gateway-rendered.yaml
          grep -q '__KAMAILIO_LISTEN_POD_SET_FQDN__' /tmp/webrtc-gateway-rendered.yaml
          grep -q '__KAMAILIO_LISTEN_INSTANCE_FQDN__' /tmp/webrtc-gateway-rendered.yaml
          ! grep -q '127\.0\.0\.2' /tmp/webrtc-gateway-rendered.yaml

      - name: Helm install
        run: |
          helm upgrade --install webrtc-gateway k8s/helm/webrtc-gateway \
            --namespace webrtc-gateway \
            --set image.tag=ci \
            --set image.pullPolicy=IfNotPresent

      - name: Wait 1 min
        run: sleep 60

      - name: DNS debug pod (persistent)
        run: |
          kubectl run dns-debug \
            --restart=Never \
            --image=postgres:16-alpine \
            --namespace webrtc-gateway \
            -- sleep 120

          kubectl wait --for=condition=Ready pod/dns-debug -n webrtc-gateway --timeout=60s || true
          # Single exec — multiple rapid kubectl execs to k3d agent kubelets often cause "error dialing backend: EOF"
          sleep 2
          kubectl exec -n webrtc-gateway dns-debug -- sh -ec "
            set -e
            echo '=== RESOLVE DB (getent) ==='
            getent hosts kamailio-db.default.svc.cluster.local. || true
            echo '=== TCP TEST (pg_isready) ==='
            pg_isready -h kamailio-db.default.svc.cluster.local. -p 5432 || true
            echo '=== RESOLV CONF ==='
            cat /etc/resolv.conf
            echo '=== ROUTES ==='
            ip route 2>/dev/null || cat /proc/net/route || true
            echo '=== SIMPLE QUERY ==='
            env PGPASSWORD=fake psql -h kamailio-db.default.svc.cluster.local. -U fake -d kamailio -c \"SELECT 1;\"
            echo '=== SIMPLE QUERY FOR VERSION CHECKING ==='
            env PGPASSWORD=fake psql -h kamailio-db.default.svc.cluster.local. -U fake -d kamailio -c \"SELECT * from version;\"
            echo '=== TABLE CHECK ==='
            env PGPASSWORD=fake psql -h kamailio-db.default.svc.cluster.local. -U fake -d kamailio -c \"\\dt\"
            echo '=== VIEW CHECK ==='
            env PGPASSWORD=fake psql -h kamailio-db.default.svc.cluster.local. -U fake -d kamailio -c \"\\dv\"
          "

          kubectl logs -n webrtc-gateway dns-debug || true

          kubectl delete pod dns-debug -n webrtc-gateway || true

      - name: Debug webrtc-gateway pods
        if: always()
        run: |
          set -e

          echo "=== PODS ==="
          kubectl get pods -n webrtc-gateway -o wide

          echo "=== DEPLOYMENT STATUS ==="
          kubectl get deployment -n webrtc-gateway -o wide || true

          echo "=== POD DETAILS ==="
          kubectl describe pods -n webrtc-gateway -l app.kubernetes.io/name=webrtc-gateway || true

          echo "=== RECENT EVENTS (IMPORTANT) ==="
          kubectl get events -n webrtc-gateway --sort-by=.lastTimestamp | tail -n 30 || true

          POD=$(kubectl get pods -n webrtc-gateway -l app.kubernetes.io/name=webrtc-gateway \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

          if [ -z "$POD" ]; then
            echo "No pods found"
            exit 0
          fi

          echo "=== TARGET POD: $POD ==="

          echo "=== CONTAINER STATE ==="
          kubectl get pod -n webrtc-gateway "$POD" -o jsonpath='{.status.containerStatuses[*].state}' || true
          echo

          echo "=== LAST LOGS ==="
          kubectl logs -n webrtc-gateway "$POD" --tail=300 || true

          echo "=== PREVIOUS LOGS (CRASH) ==="
          kubectl logs -n webrtc-gateway "$POD" --previous --tail=300 || true

      # hostNetwork pod shares the *scheduled node's* netns. With k3d agents, Kamailio may be on
      # k3d-ci-agent-0, not k3d-ci-server-0 — SIPp must docker-run --network container:<that node>.
      - name: Resolve k3d node container for webrtc-gateway (SIPp Docker netns)
        id: k3d_server
        run: |
          set -euo pipefail
          NODE=$(kubectl get pods -n webrtc-gateway -l app.kubernetes.io/name=webrtc-gateway \
            -o jsonpath='{.items[0].spec.nodeName}')
          if [ -z "${NODE}" ]; then
            echo "No webrtc-gateway pod / nodeName" >&2
            kubectl get pods -n webrtc-gateway -o wide || true
            exit 1
          fi
          if ! docker inspect "${NODE}" >/dev/null 2>&1; then
            echo "Kubernetes node ${NODE} has no matching Docker container (expected k3d node name == container name)" >&2
            docker ps -a
            exit 1
          fi
          echo "name=${NODE}" >> "$GITHUB_OUTPUT"
          echo "SIPp will join Docker netns of node ${NODE} (where hostNetwork Kamailio runs)"

      - name: SIP target (pod IP for hostNetwork)
        id: sipp_target
        run: |
          set -euo pipefail
          POD_IP=$(kubectl get pod -n webrtc-gateway webrtc-gateway-0 \
            -o jsonpath='{.status.podIP}')
          test -n "${POD_IP}"
          echo "SIPp target ${POD_IP}:5060 (pod IP; Kamailio listens on pod DNS after substitution)"
          echo "address=${POD_IP}:5060" >> "$GITHUB_OUTPUT"

      - name: Run SIPp OPTIONS check
        uses: ./.github/actions/build-sipp
        with:
          target: ${{ steps.sipp_target.outputs.address }}
          container_network: ${{ steps.k3d_server.outputs.name }}
