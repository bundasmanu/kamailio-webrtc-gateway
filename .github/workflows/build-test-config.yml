name: Docker Build and Test-Parsing Image

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - 'main'
    tags:
      - '*'

jobs:

  load-env-vars:
    runs-on: ubuntu-latest
    outputs:
      KAMAILIO_VERSION: ${{ env.KAMAILIO_VERSION }}
      STARTER_KAM_USER: ${{ env.STARTER_KAM_USER }}
      STARTER_KAM_GROUP: ${{ env.STARTER_KAM_GROUP }}
      CONFIGS_FOLDER: ${{ env.CONFIGS_FOLDER }}
    steps:
      - uses: actions/checkout@v6

      - name: Load environment variables from .env
        run: grep -v '^#' .env | grep -v '^$' >> $GITHUB_ENV

  webrtc-gateway-build-image-local:
    needs: load-env-vars
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          target: webrtc-gateway
          push: false
          load: true
          tags: webrtc-gateway:latest
          platforms: linux/amd64
          build-args: |
            KAMAILIO_VERSION=${{ needs.load-env-vars.outputs.KAMAILIO_VERSION }}
            STARTER_KAM_USER=${{ needs.load-env-vars.outputs.STARTER_KAM_USER }}
            STARTER_KAM_GROUP=${{ needs.load-env-vars.outputs.STARTER_KAM_GROUP }}
            CONFIGS_FOLDER=${{ needs.load-env-vars.outputs.CONFIGS_FOLDER }}

      - name: Run Docker image
        run: docker run --rm --env-file .env -v "$PWD/config.cfg.example:${{ needs.load-env-vars.outputs.CONFIGS_FOLDER }}/config.cfg" webrtc-gateway:latest test-config
